# =============================================================================
# CUSTOMERCONNECT API CONFIGURATION
# =============================================================================

spring:

  # ---------------------------------------------------------------------------
  # APPLICATION
  # ---------------------------------------------------------------------------
  application:
    name: customerconnect-api


  # ---------------------------------------------------------------------------
  # DATABASE CONNECTION
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:mysql://localhost:3306/customerconnect
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver


  # ---------------------------------------------------------------------------
  # JPA / HIBERNATE
  # ---------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: true


  # ---------------------------------------------------------------------------
  # SQL INITIALIZATION
  #
  # Schema creation is currently managed through the approved database model
  # and schema.sql workflow. Automatic Spring SQL initialization is disabled.
  # ---------------------------------------------------------------------------
  sql:
    init:
      mode: never
      continue-on-error: false

app:
  mfa:
    # Required for users with MFA enabled. The value must be exactly eight
    # digits and is never logged or returned by the API.
    dev-code: ${APP_MFA_DEV_CODE:}
